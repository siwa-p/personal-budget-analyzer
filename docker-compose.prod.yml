services:
  db:
    image: postgres:16-alpine
    container_name: budget_analyzer_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No port exposure — only reachable within Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: budget_analyzer_redis
    volumes:
      - redis_data:/data
    # No port exposure — only reachable within Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.prod.Dockerfile
    container_name: budget_analyzer_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: docker/backend.prod.Dockerfile
    container_name: budget_analyzer_celery
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --uid=nobody
    env_file:
      - ./backend/.env.prod
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.prod.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: budget_analyzer_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
